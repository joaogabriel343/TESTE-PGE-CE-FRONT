worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Conditional Connection header: "upgrade" for WS, "close" for regular HTTP
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — Angular Router handles /client, /driver, etc.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST API proxy → Spring Boot backend
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout    30s;
        }

        # WebSocket / SockJS proxy → Spring Boot STOMP endpoint
        # proxy_read_timeout keeps the persistent WS connection alive
        location /ws/ {
            proxy_pass http://backend:8080/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }
}
